name: Build and push

on:
  push:
    branches:
      - main
  schedule:
    # Weekly rebuild to pick up apt package updates
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: kernel
            dockerfile: Dockerfile
            tag: latest
            cache-scope: kernel
            xcover-ref: main
            pr-branch: chore/bump-xcover-build-digest
            pr-title: "chore: bump xcover-build digest"
          - name: userspace
            dockerfile: Dockerfile.usermode
            tag: userspace
            cache-scope: userspace
            xcover-ref: userspace
            pr-branch: chore/bump-xcover-build-userspace-digest
            pr-title: "chore: bump xcover-build userspace digest"

    permissions:
      contents: read
      packages: write
      id-token: write # Needed to federate with octo-sts

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          no-cache: ${{ github.event_name == 'schedule' }}
          tags: |
            ghcr.io/maxgio92/xcover-build:${{ matrix.tag }}
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}

      - name: Get token
        id: token
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # main
        with:
          scope: maxgio92/xcover
          identity: xcover-build

      - name: Checkout xcover
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: maxgio92/xcover
          ref: ${{ matrix.xcover-ref }}
          token: ${{ steps.token.outputs.token }}
          path: xcover

      - name: Update Makefile
        run: |
          sed -i "s|^BUILD_IMAGE :=.*|BUILD_IMAGE := ghcr.io/maxgio92/xcover-build@${{ steps.build.outputs.digest }}|" xcover/Makefile

      - name: Open PR
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          token: ${{ steps.token.outputs.token }}
          path: xcover
          commit-message: ${{ matrix.pr-title }}
          title: ${{ matrix.pr-title }}
          body: |
            New digest: `${{ steps.build.outputs.digest }}`

            /cc @maxgio92
          branch: ${{ matrix.pr-branch }}
          delete-branch: true
          base: ${{ matrix.xcover-ref }}
